name: code checks

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
    paths:
      - .pre-commit-config.yaml
      - .github/workflows/code_checks.yml
      - '**.py'
      - uv.lock
      - pyproject.toml
      - '**.ipynb'
  pull_request:
    branches:
      - main
    paths:
      - .pre-commit-config.yaml
      - .github/workflows/code_checks.yml
      - '**.py'
      - uv.lock
      - pyproject.toml
      - '**.ipynb'

jobs:
  run-code-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@557e51de59eb14aaaba2ed9621916900a91d50c6
        with:
          version: "0.7.20"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version-file: ".python-version"

      - name: Sync dependencies (project + dev only)
        run: |
          # This installs:
          # - main [project].dependencies
          # - [dependency-groups].dev
          # It does NOT pull in the docs group.
          uv sync --group dev

      - name: Run pre-commit on all files
        run: |
          uv run pre-commit run --all-files

      - name: pip-audit (gh-action-pip-audit)
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266
        continue-on-error: true
        with:
          # Use the venv created by `uv sync`
          virtual-environment: .venv/

      # Optional but nice for disk-constrained runners
      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf .uv || true
          rm -rf .venv || true
