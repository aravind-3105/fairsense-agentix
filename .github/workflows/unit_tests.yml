name: unit tests
permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
    paths:
      - .pre-commit-config.yaml
      - .github/workflows/code_checks.yml
      - .github/workflows/docs.yml
      - .github/workflows/unit_tests.yml
      - .github/workflows/integration_tests.yml
      - '**.py'
      - '**.ipynb'
      - uv.lock
      - pyproject.toml
      - '**.rst'
      - '**.md'
  pull_request:
    branches:
      - main
    paths:
      - .pre-commit-config.yaml
      - .github/workflows/code_checks.yml
      - .github/workflows/docs.yml
      - .github/workflows/unit_tests.yml
      - .github/workflows/integration_tests.yml
      - '**.py'
      - '**.ipynb'
      - uv.lock
      - pyproject.toml
      - '**.rst'
      - '**.md'

jobs:
  unit-tests:
    if: false # disable this job until disk issue fixed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@1e862dfacbd1d6d858c55d9b792c756523627244
        with:
          # Install a specific version of uv.
          version: "0.7.20"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version-file: ".python-version"

      - name: Sync dependencies for unit tests (project + dev, no docs)
        run: |
          # Disable default-groups (dev + docs), then explicitly enable only dev.
          uv sync --group dev --no-default-groups

      - name: Run unit tests
        run: |
          uv run pytest -m "unit" \
            --cov fairsense_agentix \
            --cov-report=xml \
            --maxfail=10 \
            -v \
            tests/

      # # Uncomment this once this repo is configured on Codecov
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@5a1091511ad55cbe89839c7260b706298ca349f7
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     slug: VectorInstitute/aieng-template-uv
      #     fail_ci_if_error: true
      #     verbose: true

      - name: Cleanup disk space
        if: always()
        run: |
          rm -rf .venv
          rm -rf .uv
          rm -rf ~/.cache/huggingface
          rm -rf ~/.cache/torch
          rm -rf ~/.cache/pip
          df -h
