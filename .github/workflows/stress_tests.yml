name: stress tests

permissions:
  contents: read
  pull-requests: write

# Only run manually or on schedule (not on every PR/push)
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM UTC

jobs:
  stress-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@557e51de59eb14aaaba2ed9621916900a91d50c6
        with:
          version: "0.7.20"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version-file: ".python-version"

      - name: Sync dependencies
        run: |
          uv sync --group dev --no-default-groups

      - name: Run stress tests
        run: |
          uv run pytest -m "stress" \
            -v \
            --tb=short \
            tests/stress/

      - name: Cleanup disk space
        if: always()
        run: |
          rm -rf .venv
          rm -rf .uv
          rm -rf ~/.cache/huggingface
          rm -rf ~/.cache/torch
          rm -rf ~/.cache/pip
          df -h
