# Use Python 3.12 for hook venvs (matches requires-python)
default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0  # Use the ref you want to point at
    hooks:
    - id: trailing-whitespace
      exclude: "^fairsense_agentix/data/.*"
    - id: check-ast
    - id: check-builtin-literals
    - id: check-docstring-first
    - id: check-executables-have-shebangs
    - id: debug-statements
    - id: end-of-file-fixer
      exclude: "^fairsense_agentix/data/.*"
    - id: mixed-line-ending
      args: [--fix=lf]
      exclude: "^fairsense_agentix/data/.*"
    - id: fix-byte-order-marker
    - id: check-merge-conflict
    - id: check-symlinks
    - id: detect-private-key
    - id: check-yaml
      args: [--unsafe]
    - id: check-toml

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.4
    hooks:
      - id: uv-lock

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 'v0.15.9'
    hooks:
    - id: ruff-check
      args: [--fix, --exit-non-zero-on-fix]
      types_or: [python, jupyter]
    - id: ruff-format
      types_or: [python, jupyter]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
    - id: mypy
      entry: python3 -m mypy --config-file pyproject.toml
      language: system
      types: [python]
      exclude: "^(tests|fairsense_agentix/data)/.*"

  - repo: https://github.com/crate-ci/typos
    rev: v1.45.0
    hooks:
      - id: typos
        args: []
        exclude: "^fairsense_agentix/data/.*"

  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
    - id: nbqa-ruff
      args: [--fix, --exit-non-zero-on-fix]

  - repo: local
    hooks:
    - id: doctest
      name: doctest
      entry: python3 -m doctest -o NORMALIZE_WHITESPACE
      files: "^src/fairsense-agentix/"
      language: system

  - repo: local
    hooks:
    - id: pytest
      name: pytest
      entry: python3 -m pytest -m "not integration_test"
      language: system
      pass_filenames: false
      always_run: true

ci:
    autofix_commit_msg: |
        [pre-commit.ci] Add auto fixes from pre-commit.com hooks

        for more information, see https://pre-commit.ci
    autofix_prs: true
    autoupdate_branch: ''
    autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
    autoupdate_schedule: weekly
    skip: [pytest, doctest, mypy]
    submodules: false
